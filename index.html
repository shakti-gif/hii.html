<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee with You ☕</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    background: white;
    padding: 30px;
    border-radius: 25px;
    width: 90%;
    max-width: 420px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
  }

  img {
    width: 200px;
    margin-bottom: 15px;
    border-radius: 15px;
  }

  h1 {
    font-size: 22px;
    color: #ff5c8a;
  }

  p {
    color: #555;
  }

  /* YES AREA */
  .yes-area {
    margin-top: 20px;
    min-height: 80px; /* reserves space */
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #yesBtn {
    padding: 14px 28px;
    font-size: 16px;
    border-radius: 30px;
    border: none;
    background: #ff5c8a;
    color: white;
    cursor: pointer;
    transition: transform 0.3s ease;
  }

  /* NO AREA */
  .no-area {
    margin-top: 20px;
    min-height: 90px; /* space for multiline text */
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #noBtn {
    padding: 12px 22px;
    font-size: 16px;
    border-radius: 20px;
    border: none;
    background: #eee;
    cursor: pointer;
    line-height: 1.4;
    max-width: 100%;
  }

  .quote {
    margin-top: 25px;
    font-style: italic;
    color: #ff5c8a;
    font-size: 18px;
    display: none;
  }
</style>
</head>

<body>

<div class="container" id="app">
  <img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif">

  <h1>Yasmin ☕💖</h1>
  <p>Would you like to go grab a coffee with me?</p>

  <!-- YES BUTTON AREA -->
  <div class="yes-area">
    <button id="yesBtn">Yes ☕</button>
  </div>

  <!-- NO RESPONSE AREA -->
  <div class="no-area">
    <button id="noBtn">No 🙈</button>
  </div>

  <div class="quote" id="quote">
    “I’ll want to take a risk.”
  </div>

  <!-- Sounds -->
  <audio id="noSound" src="https://assets.mixkit.co/sfx/preview/mixkit-bubble-pop-up-alert-notification-2357.mp3"></audio>
  <audio id="yesSound" src="https://assets.mixkit.co/sfx/preview/mixkit-happy-bells-notification-937.mp3"></audio>
</div>

<script>
const noTexts = [
  "Are you sure u'll not come with me? 🥺",
  "Not if<br>coffee is on me ☕",
  "not<br>just one cup? 🥹",
  "Don't u want to<br>talk n smile with me in cafe? ☺️",
  "Not if we will<br>talk using tissues on table like movies? 💕",
  "Okay last time asking..<br>No? 😅"
];

let step = 0;
let scale = 1;

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const quote = document.getElementById("quote");
const app = document.getElementById("app");
const noSound = document.getElementById("noSound");
const yesSound = document.getElementById("yesSound");

noBtn.addEventListener("click", () => {
  noSound.play();

  step++;
  scale += 0.4;                 // YES grows
  yesBtn.style.transform = `scale(${scale})`;

  if (step < noTexts.length) {
    noBtn.innerHTML = noTexts[step];
  }

  if (step === noTexts.length - 1) {
    noBtn.style.display = "none";
    quote.style.display = "block";
  }
});

yesBtn.addEventListener("click", () => {
  yesSound.play();
  app.innerHTML = `
    <img src="https://media.giphy.com/media/l4FGpP4lxGGgK5CBW/giphy.gif">
    <h1>Yayyy! ☕💖</h1>
    <p>Looking forward to a cozy coffee with you, Yasmin.</p>
    <div class="quote" style="display:block;">
      “Sometimes I like to take a little risk… and this time, I want to be there to feel how it feels after choosing that risk.”
    </div>
  `;
});
</script>

</body>
</html>
